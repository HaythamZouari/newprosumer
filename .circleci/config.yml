version: 2
jobs:
  build:
    working_directory: ~/stage
    docker:
      - image: circleci/php:7.3.8-apache-stretch-node-browsers
        environment:
          APP_ENV: test
          DATABASE_URL: mysql://root:root@127.0.0.1/stage
          MAILER_FROM: micro@micropost.com
          MAILER_URL: null://localhost
      - image: circleci/mysql:5.7.27
        environment:
          MYSQL_ROOT_PASSWORD: 'root'
          MYSQL_DATABASE: 2710199o
    steps:
      - checkout
      - run:
          name: Install PHP MySQL
          command: sudo docker-php-ext-install pdo_mysql
      - run:
          name: Install GD library
          command:   sudo apt-get install -y libfreetype6-dev libjpeg62-turbo-dev libpng-dev && sudo docker-php-ext-configure gd --with-freetype-dir=/usr/include/ --with-jpeg-dir=/usr/include/ && sudo docker-php-ext-install -j$(nproc) gd
      - run:
          name: Wait for MySQL
          command: dockerize -wait tcp://127.0.0.1:3306 -timeout 120s
      - run:
          name: Composer
          command: sudo composer self-update
      - run:
          name: Composer install
          command: composer install -n --prefer-dist
      - run:
          name: Run diff
          command: php bin/console doctrine:migrations:diff --env=test --no-interaction
      - run:
          name: Run mig
          command: php bin/console doctrine:migrations:migrate --env=test --no-interaction
      - run:
          name: Run tests
          command: ./bin/phpunit
  deploy:
    working_directory: ~/stage
    docker:
      - image: circleci/php:7.3.8-apache-stretch-node-browsers
    steps:
      - checkout
      - run:
          name: Composer install
          command: composer install -n --prefer-dist
      - run:
          name: Clear Cache
          command: php bin/console cache:clear --env=prod --no-interaction
      - run:
          name: Run diff
          command: php bin/console doctrine:migrations:diff --env=test --no-interaction
      - run:
          name: Run mig
          command: php bin/console doctrine:migrations:migrate --env=test --no-interaction
      - run:
          name: Run tests
          command: ./bin/phpunit



